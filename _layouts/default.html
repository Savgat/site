<!doctype html>
<html lang="fr">
{% include head.html %}
<body>
  {% include header.html %}
  <main id="contenu">
    {{ content }}
  </main>
  {% include footer.html %}

  {%- if site.adsense.enabled -%}
  {% include consent-banner.html %}
  <script>
    (function () {
      var KEY = "sg-consent";
      var loaded = false;
      function loadAds() {
        if (loaded) return; loaded = true;
        var s = document.createElement("script");
        s.async = true; s.crossOrigin = "anonymous";
        s.src = "https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client={{ site.adsense.publisher_id }}";
        document.head.appendChild(s);
      }
      function hideBanner() { var b = document.getElementById("consent-banner"); if (b) b.hidden = true; }
      function showBanner() { var b = document.getElementById("consent-banner"); if (b) b.hidden = false; }
      var choice = null; try { choice = localStorage.getItem(KEY); } catch (e) {}
      if (choice === "accepted") { loadAds(); }
      else if (choice !== "refused") { showBanner(); }
      var a = document.getElementById("consent-accept");
      var r = document.getElementById("consent-refuse");
      if (a) a.addEventListener("click", function () { try { localStorage.setItem(KEY, "accepted"); } catch (e) {} hideBanner(); loadAds(); });
      if (r) r.addEventListener("click", function () { try { localStorage.setItem(KEY, "refused"); } catch (e) {} hideBanner(); });
    })();
  </script>
  {%- endif -%}

  <script src="{{ '/assets/js/main.js' | relative_url }}" defer></script>
</body>
</html>
