---
layout: default
---
<div class="page-hero">
  <div class="container">
    <h1 class="page-hero-title">{{ page.title }}</h1>
    {%- if page.subtitle -%}<p class="page-hero-subtitle">{{ page.subtitle }}</p>{%- endif -%}
  </div>
</div>

<div class="container section">
  <article class="prose">
    {%- if page.portrait -%}
    <figure class="page-portrait">
      <img src="{{ page.portrait | relative_url }}" alt="{{ page.portrait_alt | default: page.title }}" width="220" height="220">
      {%- if page.portrait_caption -%}<figcaption class="form-note">{{ page.portrait_caption }}</figcaption>{%- endif -%}
    </figure>
    {%- endif -%}

    {{ content }}

    {%- if page.cta_label and page.cta_url -%}
    <p class="page-cta"><a class="btn btn-accent" href="{{ page.cta_url | relative_url }}">{{ page.cta_label }}</a></p>
    {%- endif -%}
  </article>
</div>
