---
layout: default
title: "Page introuvable"
permalink: /404.html
sitemap: false
---
{%- assign nf = site.data.ui.notfound -%}
<div class="section" style="text-align:center;">
  <div class="container">
    <p style="font-size:5rem; margin:0;">{{ nf.emoji }}</p>
    <h1>{{ nf.title }}</h1>
    <p class="lead" style="margin-inline:auto;">{{ nf.text }}</p>
    <div class="hero-actions" style="justify-content:center;">
      <a class="btn btn-accent" href="{{ '/' | relative_url }}">{{ nf.button_home }}</a>
      <a class="btn btn-ghost" href="{{ '/blog/' | relative_url }}">{{ nf.button_blog }}</a>
      <a class="btn btn-ghost" href="{{ '/livres/' | relative_url }}">{{ nf.button_books }}</a>
    </div>
  </div>
</div>
